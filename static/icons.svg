    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
  </symbol>

  <!-- Memory Chip -->
  <symbol id="icon-memory" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="6" width="18" height="12" rx="1"/>
    <line x1="7" y1="6" x2="7" y2="3"/>
    <line x1="12" y1="6" x2="12" y2="3"/>
    <line x1="17" y1="6" x2="17" y2="3"/>
    <line x1="7" y1="18" x2="7" y2="21"/>
    <line x1="12" y1="18" x2="12" y2="21"/>
