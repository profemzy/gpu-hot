
services:
  gpu-hot:
    build: .
    container_name: gpu-hot
    ports:
      - "1312:1312"
    environment:
      - NODE_NAME=${HOSTNAME}
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    init: true
    pid: "host"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1312/api/gpu-data"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
