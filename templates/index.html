<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Hot</title>
    <meta name="description"
        content="Real-time NVIDIA GPU monitoring dashboard — temperature, utilization, memory, power and more">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">

    <script>
    (function(){try{var m=localStorage.getItem('gpu-hot-theme-mode');var l=localStorage.getItem('gpu-hot-theme');if(l){m=l;localStorage.setItem('gpu-hot-theme-mode',l);localStorage.removeItem('gpu-hot-theme')}var t;if(m==='dark')t='dark';else if(m==='light')t='light';else t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t)}catch(e){document.documentElement.setAttribute('data-theme','dark')}})();
    </script>

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Application Styles (modular) -->
    <link rel="stylesheet" href="/static/css/tokens.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/skeletons.css">
</head>

<body>
    <!-- Gradient mesh background -->
    <div class="bg-mesh" aria-hidden="true"></div>

    <!-- Icon Sprite (hidden, referenced via <use>) -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
      <symbol id="icon-gpu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="4" width="16" height="16" rx="2"/>
        <rect x="7" y="7" width="10" height="10" rx="1"/>
        <line x1="7" y1="2" x2="7" y2="4"/>
        <line x1="12" y1="2" x2="12" y2="4"/>
        <line x1="17" y1="2" x2="17" y2="4"/>
        <line x1="7" y1="20" x2="7" y2="22"/>
        <line x1="12" y1="20" x2="12" y2="22"/>
        <line x1="17" y1="20" x2="17" y2="22"/>
        <line x1="2" y1="7" x2="4" y2="7"/>
        <line x1="2" y1="12" x2="4" y2="12"/>
        <line x1="2" y1="17" x2="4" y2="17"/>
        <line x1="20" y1="7" x2="22" y2="7"/>
        <line x1="20" y1="12" x2="22" y2="12"/>
        <line x1="20" y1="17" x2="22" y2="17"/>
      </symbol>
      <symbol id="icon-thermometer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v10"/>
        <path d="M8 10h8"/>
        <circle cx="12" cy="18" r="4"/>
        <path d="M8 14v4a4 4 0 0 0 8 0v-4"/>
      </symbol>
      <symbol id="icon-bolt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </symbol>
      <symbol id="icon-memory" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="6" width="18" height="12" rx="1"/>
        <line x1="7" y1="6" x2="7" y2="3"/>
        <line x1="12" y1="6" x2="12" y2="3"/>
        <line x1="17" y1="6" x2="17" y2="3"/>
        <line x1="7" y1="18" x2="7" y2="21"/>
        <line x1="12" y1="18" x2="12" y2="21"/>
        <line x1="17" y1="18" x2="17" y2="21"/>
      </symbol>
      <symbol id="icon-fan" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 3a3 3 0 0 0 0 6c2 0 3-1 6-3"/>
        <path d="M21 12a3 3 0 0 0-6 0c0 2 1 3 3 6"/>
        <path d="M12 21a3 3 0 0 0 0-6c-2 0-3 1-6 3"/>
        <path d="M3 12a3 3 0 0 0 6 0c0-2-1-3-3-6"/>
      </symbol>
      <symbol id="icon-speedometer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a10 10 0 1 0 10 10"/>
        <path d="M12 6v6l4 2"/>
        <path d="M20 4l-4 4"/>
      </symbol>
      <symbol id="icon-cpu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="4" width="16" height="16" rx="2"/>
        <rect x="9" y="9" width="6" height="6"/>
        <line x1="9" y1="1" x2="9" y2="4"/>
        <line x1="15" y1="1" x2="15" y2="4"/>
        <line x1="9" y1="20" x2="9" y2="23"/>
        <line x1="15" y1="20" x2="15" y2="23"/>
        <line x1="20" y1="9" x2="23" y2="9"/>
        <line x1="20" y1="14" x2="23" y2="14"/>
        <line x1="1" y1="9" x2="4" y2="9"/>
        <line x1="1" y1="14" x2="4" y2="14"/>
      </symbol>
      <symbol id="icon-chip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="5" width="14" height="14" rx="2"/>
        <line x1="8" y1="1" x2="8" y2="5"/>
        <line x1="16" y1="1" x2="16" y2="5"/>
        <line x1="8" y1="19" x2="8" y2="23"/>
        <line x1="16" y1="19" x2="16" y2="23"/>
        <line x1="1" y1="8" x2="5" y2="8"/>
        <line x1="1" y1="16" x2="5" y2="16"/>
        <line x1="19" y1="8" x2="23" y2="8"/>
        <line x1="19" y1="16" x2="23" y2="16"/>
      </symbol>
      <symbol id="icon-network" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="4" width="6" height="6"/>
        <rect x="14" y="4" width="6" height="6"/>
        <rect x="4" y="14" width="6" height="6"/>
        <rect x="14" y="14" width="6" height="6"/>
        <line x1="10" y1="7" x2="14" y2="7"/>
        <line x1="7" y1="10" x2="7" y2="14"/>
        <line x1="17" y1="10" x2="17" y2="14"/>
        <line x1="10" y1="17" x2="14" y2="17"/>
      </symbol>
      <symbol id="icon-disk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="7" x2="12" y2="2"/>
      </symbol>
      <symbol id="icon-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </symbol>
      <symbol id="icon-activity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </symbol>
      <symbol id="icon-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </symbol>
      <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </symbol>
      <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </symbol>
      <symbol id="icon-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
        <circle cx="8" cy="10" r="3"/>
        <path d="M17 7l3 3-3 3"/>
      </symbol>
    </svg>

    <div class="studio">
        <!-- Sidebar -->
        <aside class="sidebar" role="navigation" aria-label="GPU navigation">
            <div class="sidebar-logo">GPU<span>Hot</span></div>

            <nav class="sidebar-nav" id="view-selector" aria-label="GPU views">
                <button class="sidebar-btn active" data-view="overview" onclick="switchToView('overview')"
                    aria-label="Overview: All GPUs" aria-pressed="true" title="All GPUs">Overview</button>
            </nav>

            <div class="sidebar-bottom">
                <!-- System info -->
                <div class="system-info" aria-label="System metrics">
                    <div class="sidebar-system-item" aria-label="CPU usage">
                        <div class="sidebar-system-chart-wrap">
                            <canvas class="system-metric-chart" id="cpu-chart" aria-hidden="true"></canvas>
                        </div>
                        <div class="system-metric-value" id="cpu-usage" aria-live="polite">0%</div>
                        <div class="system-metric-label">CPU</div>
                    </div>
                    <div class="sidebar-system-item" aria-label="Memory usage">
                        <div class="sidebar-system-chart-wrap">
                            <canvas class="system-metric-chart" id="memory-chart" aria-hidden="true"></canvas>
                        </div>
                        <div class="system-metric-value" id="memory-usage" aria-live="polite">0%</div>
                        <div class="system-metric-label">RAM</div>
                    </div>
                </div>

                <!-- Theme toggle -->
                <button id="theme-toggle" class="sidebar-link" title="System theme"
                    aria-label="System theme. Click for dark mode" aria-pressed="false">
                    <!-- System/auto icon (shown in auto mode) -->
                    <svg class="icon-auto" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display: none;">
                        <rect x="2" y="3" width="20" height="14" rx="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                        <circle cx="8" cy="10" r="3"/>
                        <path d="M17 7l3 3-3 3"/>
                    </svg>
                    <!-- Sun icon (shown in light mode) -->
                    <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display: none;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <!-- Moon icon (shown in dark mode) -->
                    <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>

                <!-- GitHub link -->
                <a href="https://github.com/psalias2006/gpu-hot" target="_blank" rel="noopener noreferrer"
                    class="sidebar-link" aria-label="View on GitHub" title="GitHub">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
                    </svg>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main" role="main">
            <div class="header">
                <div class="header-row">
                    <div class="header-status" role="status" aria-live="polite" aria-label="Connection status">
                        <div class="status-dot" id="status-dot" aria-hidden="true"></div>
                        <span id="connection-status">Connecting</span>
                    </div>
                    <div class="version-info" id="version-info">
                        <span id="version-current"></span>
                        <span class="update-badge" id="update-badge" style="display: none;">
                            <a href="#" id="update-link" target="_blank" rel="noopener noreferrer">Update</a>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Overview Tab -->
            <div id="tab-overview" class="tab-content active">
                <div id="overview-container" class="overview-grid">
                    <div class="loading">
                        <div class="loading-dot"></div>
                        <span>Waiting for GPU data…</span>
                    </div>
                </div>
            </div>

            <!-- Individual GPU Tabs (dynamically created) -->

            <!-- Processes -->
            <div class="processes-section">
                <div class="processes-header" onclick="toggleProcesses()">
                    <div class="processes-title">Processes</div>
                    <div class="processes-toggle">
                        <span id="process-count">0</span>
                        <span class="toggle-icon">&#9660;</span>
                    </div>
                </div>
                <div class="processes-content" id="processes-content">
                    <div class="processes-inner" id="processes-container">
                        <div class="loading">
                            <div class="loading-dot"></div>
                            <span>Loading processes…</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Chart detail drawer -->
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <div class="drawer" id="chart-drawer">
        <div class="drawer-header">
            <div class="drawer-header-left">
                <span class="drawer-title" id="drawer-title">Chart</span>
                <div class="drawer-hero" id="drawer-hero">
                    <span class="drawer-hero-value" id="drawer-hero-value">--</span>
                    <span class="drawer-hero-unit" id="drawer-hero-unit"></span>
                </div>
            </div>
            <button class="drawer-close" id="drawer-close" aria-label="Close">&times;</button>
        </div>
        <div class="drawer-body">
            <div class="drawer-chart-wrap">
                <canvas id="drawer-chart-canvas"></canvas>
            </div>
            <div class="drawer-companions" id="drawer-companions"></div>
            <div class="drawer-stats-bar" id="drawer-stats"></div>
        </div>
    </div>

    <!-- Star toast -->
    <div class="star-toast is-hidden" id="star-toast" role="status" aria-live="polite">
        <button class="star-toast-close" type="button" data-action="dismiss" aria-label="Close">&times;</button>
        <div class="star-toast-title">Star on GitHub</div>
        <div class="star-toast-text">Help others discover GPU Hot</div>
        <div class="star-toast-progress-wrap is-hidden" id="star-progress-wrap">
            <div class="star-toast-progress-bar">
                <div class="star-toast-progress-fill" id="star-progress-fill"></div>
            </div>
            <div class="star-toast-milestone" id="star-toast-milestone"></div>
        </div>
        <button class="star-toast-btn" type="button" data-action="star">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                <path
                    d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z" />
            </svg>
            Star
        </button>
    </div>

    <!-- Application Scripts -->
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/chart-config.js"></script>
    <script src="/static/js/chart-manager.js"></script>
    <script src="/static/js/gpu-cards.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/socket-handlers.js"></script>
    <script src="/static/js/chart-drawer.js"></script>
    <script src="/static/js/app.js"></script>
</body>

</html>
